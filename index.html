<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FTC Premier Istanbul 2025 · World Teams</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan:    #00d4ff;
      --purple:  #7b2fff;
      --magenta: #ff2d78;
      --bg:      #04040f;
      --bg2:     #080c1e;
      --panel:   rgba(6, 9, 22, 0.97);
      --border:  rgba(0, 212, 255, 0.22);
      --text:    #b8cce8;
      --bright:  #e2efff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ─── HEADER ───────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 58px; z-index: 1000;
      background: linear-gradient(135deg, rgba(4,4,15,0.98) 0%, rgba(10,7,24,0.98) 100%);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px);
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      animation: fadeUp 0.5s ease both;
    }
    #header::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--cyan) 30%, var(--purple) 70%, transparent 100%);
      opacity: 0.6;
    }

    .h-logo { display: flex; align-items: center; gap: 14px; }
    .h-badge {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; font-weight: 700;
      color: var(--cyan);
      border: 1px solid rgba(0,212,255,0.4);
      padding: 4px 10px; border-radius: 3px;
      text-shadow: 0 0 12px var(--cyan);
      box-shadow: inset 0 0 8px rgba(0,212,255,0.05), 0 0 8px rgba(0,212,255,0.08);
      letter-spacing: 2px;
    }
    .h-title { display: flex; flex-direction: column; gap: 1px; }
    .h-title h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700;
      color: var(--bright); letter-spacing: 3px;
    }
    .h-title p {
      font-size: 9px; color: var(--cyan);
      letter-spacing: 4px; text-transform: uppercase; opacity: 0.75;
    }

    .h-stats { display: flex; gap: 12px; align-items: center; }
    .stat-card {
      display: flex; flex-direction: column; align-items: center;
      padding: 5px 18px;
      background: rgba(0,212,255,0.04);
      border: 1px solid var(--border); border-radius: 3px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.4;
    }
    .stat-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 20px; font-weight: 900; line-height: 1;
      color: var(--cyan); text-shadow: 0 0 14px var(--cyan);
    }
    .stat-lbl {
      font-size: 8px; letter-spacing: 2.5px;
      text-transform: uppercase; color: var(--text);
      margin-top: 2px; opacity: 0.8;
    }

    .h-search {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,212,255,0.05);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 6px 12px;
    }
    .h-search input {
      background: none; border: none; outline: none;
      color: var(--bright); font-family: 'Exo 2', sans-serif;
      font-size: 12px; width: 160px;
    }
    .h-search input::placeholder { color: rgba(184,204,232,0.35); }
    .h-search svg { opacity: 0.4; flex-shrink: 0; }

    /* ─── SCANLINES ──────────────────────────────── */
    #scanlines {
      position: fixed; inset: 58px 0 0 0; z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.04) 3px, rgba(0,0,0,0.04) 4px
      );
    }

    /* ─── MAP ────────────────────────────────────── */
    #map {
      position: fixed; top: 58px; left: 0; right: 0; bottom: 0; z-index: 1;
    }
    .leaflet-container { background: #03030c; }
    .leaflet-control-zoom {
      border: 1px solid var(--border) !important;
      background: var(--panel) !important;
      border-radius: 3px !important;
      box-shadow: none !important;
    }
    .leaflet-control-zoom a {
      background: transparent !important;
      color: var(--cyan) !important;
      border-bottom: 1px solid var(--border) !important;
      width: 28px !important; height: 28px !important;
      line-height: 28px !important; font-size: 16px !important;
    }
    .leaflet-control-zoom a:last-child { border-bottom: none !important; }
    .leaflet-control-zoom a:hover { background: rgba(0,212,255,0.1) !important; }
    .leaflet-control-attribution {
      background: rgba(4,4,15,0.75) !important;
      color: rgba(184,204,232,0.3) !important;
      font-size: 8px !important;
    }
    .leaflet-control-attribution a { color: rgba(0,212,255,0.4) !important; }

    /* ─── CLUSTERS ───────────────────────────────── */
    .cluster-wrap { background: transparent; border: none; }
    .cluster-inner {
      width: 36px; height: 36px;
      background: rgba(0,212,255,0.08);
      border: 1.5px solid rgba(0,212,255,0.55);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Orbitron', sans-serif; font-size: 11px; font-weight: 700;
      color: var(--cyan); text-shadow: 0 0 8px var(--cyan);
      box-shadow: 0 0 14px rgba(0,212,255,0.2), inset 0 0 10px rgba(0,212,255,0.06);
    }
    .cluster-inner.lg {
      width: 44px; height: 44px; font-size: 13px;
    }

    /* ─── MARKERS ───────────────────────────────── */
    .pin-wrap {
      position: relative; width: 22px; height: 22px; cursor: pointer;
    }
    .pin-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 9px; height: 9px;
      background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 6px var(--cyan), 0 0 14px var(--cyan);
      z-index: 2;
      transition: width 0.45s ease, height 0.45s ease,
                  background 0.45s ease, box-shadow 0.45s ease,
                  opacity 0.45s ease;
    }
    .pin-ring {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 9px; height: 9px;
      border: 1.5px solid var(--cyan); border-radius: 50%;
      animation: pinPulse 2.4s ease-out infinite;
      transition: opacity 0.4s ease, border-color 0.4s ease;
    }
    .pin-ring.r2 { animation-delay: 1.2s; }
    @keyframes pinPulse {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.7; }
      100% { transform: translate(-50%,-50%) scale(4); opacity: 0; }
    }
    /* Manual-click active */
    .pin-wrap.active .pin-dot {
      background: var(--magenta);
      box-shadow: 0 0 8px var(--magenta), 0 0 20px var(--magenta);
      width: 12px; height: 12px;
    }
    .pin-wrap.active .pin-ring { border-color: var(--magenta); }

    /* ─── SPOTLIGHT MODE — dim all normal pins ─── */
    #map.spotlight-mode .pin-dot {
      background: rgba(0,212,255,0.12) !important;
      box-shadow: none !important;
      width: 6px !important; height: 6px !important;
      opacity: 0.4 !important;
    }
    #map.spotlight-mode .pin-ring {
      opacity: 0 !important;
    }
    /* Also dim cluster bubbles */
    #map.spotlight-mode .cluster-inner {
      opacity: 0.2 !important;
      transition: opacity 0.45s ease;
    }

    /* ─── SPOTLIGHT BEACON (separate class names — immune to dim rules) ─── */
    .spotlight-beacon {
      position: relative; width: 38px; height: 38px;
      pointer-events: none;
    }
    .sb-dot {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 11px; height: 11px;
      background: var(--magenta); border-radius: 50%;
      box-shadow:
        0 0 8px var(--magenta),
        0 0 20px var(--magenta),
        0 0 38px rgba(255,45,120,0.5);
      z-index: 3;
    }
    .sb-ring {
      position: absolute; top: 50%; left: 50%;
      border: 1.5px solid var(--magenta); border-radius: 50%;
      width: 11px; height: 11px;
      animation: sbPulse 2.1s ease-out infinite;
    }
    .sb-ring.r2 { animation-delay: 0.7s; }
    .sb-ring.r3 { animation-delay: 1.4s; }
    @keyframes sbPulse {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 0.85; }
      100% { transform: translate(-50%,-50%) scale(5); opacity: 0; }
    }



    /* ─── CITY FILTER PANEL ──────────────────────── */
    #city-panel {
      position: fixed; top: 58px; left: 0; bottom: 0;
      width: 240px; z-index: 400;
      background: var(--panel);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column; overflow: hidden;
    }
    #city-panel.open { transform: translateX(0); }
    #city-panel::after {
      content: ''; position: absolute;
      top: 0; right: 0; bottom: 0; width: 1px;
      background: linear-gradient(180deg, var(--cyan), var(--purple), transparent);
      opacity: 0.4;
    }

    .cp-header {
      padding: 16px 16px 10px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .cp-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; letter-spacing: 3px; color: var(--cyan);
      opacity: 0.75; text-transform: uppercase;
    }
    .cp-subtitle { font-size: 10px; color: var(--text); opacity: 0.5; margin-top: 3px; }

    /* Search within panel */
    .cp-search {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .cp-search input {
      width: 100%; background: rgba(0,212,255,0.04);
      border: 1px solid var(--border); border-radius: 3px;
      padding: 5px 9px; outline: none;
      color: var(--bright); font-family: 'Exo 2', sans-serif; font-size: 11px;
    }
    .cp-search input::placeholder { color: rgba(184,204,232,0.3); }

    .cp-list { flex: 1; overflow-y: auto; padding: 6px 0; }
    .cp-list::-webkit-scrollbar { width: 3px; }
    .cp-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .cp-all {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px 7px; cursor: pointer;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
      transition: background 0.15s;
    }
    .cp-all:hover { background: rgba(0,212,255,0.05); }
    .cp-all-dot {
      width: 8px; height: 8px;
      background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 6px var(--cyan);
    }
    .cp-all-lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; color: var(--cyan); letter-spacing: 2px;
    }

    .cp-item {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 7px 16px; cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }
    .cp-item:hover { background: rgba(0,212,255,0.05); border-left-color: rgba(0,212,255,0.3); }
    .cp-item.active { background: rgba(0,212,255,0.09); border-left-color: var(--cyan); }
    .cp-item.hidden { display: none; }

    .cp-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .cp-city { font-size: 12px; color: var(--bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cp-country-lbl { font-size: 9px; color: var(--text); opacity: 0.55; }
    .cp-count {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; color: var(--cyan); opacity: 0.65;
      flex-shrink: 0; margin-top: 2px;
    }

    /* ─── FLOATING BUTTONS ───────────────────────── */
    .float-btn {
      position: fixed; z-index: 600;
      padding: 9px 14px;
      background: var(--panel);
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--cyan);
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s;
      display: flex; align-items: center; gap: 8px;
      user-select: none;
    }
    .float-btn:hover {
      background: rgba(0,212,255,0.1);
      border-color: rgba(0,212,255,0.45);
      box-shadow: 0 0 14px rgba(0,212,255,0.1);
    }
    #btn-spotlight { bottom: 24px; right: 24px; }
    #btn-cities  { bottom: 24px; left: 24px; }
    #btn-reset   { bottom: 24px; left: 160px; opacity: 0; pointer-events: none; transition: opacity 0.2s, left 0.25s; }
    #btn-reset.show { opacity: 1; pointer-events: all; }

    /* Corner decorations */
    .corner { position: fixed; z-index: 900; pointer-events: none; }
    .corner::before, .corner::after { content: ''; position: absolute; background: var(--cyan); opacity: 0.4; }
    .corner.tl { top: 66px; left: 6px; } .corner.tr { top: 66px; right: 6px; }
    .corner.bl { bottom: 6px; left: 6px; } .corner.br { bottom: 6px; right: 6px; }
    .corner::before { width: 10px; height: 1px; } .corner::after { width: 1px; height: 10px; }
    .corner.tl::before { top: 0; left: 0; } .corner.tl::after { top: 0; left: 0; }
    .corner.tr::before { top: 0; right: 0; } .corner.tr::after { top: 0; right: 0; }
    .corner.bl::before { bottom: 0; left: 0; } .corner.bl::after { bottom: 0; left: 0; }
    .corner.br::before { bottom: 0; right: 0; } .corner.br::after { bottom: 0; right: 0; }

    /* ─── LEAFLET POPUP OVERRIDE ─────────────────── */
    .leaflet-popup-content-wrapper {
      background: rgba(6,9,22,0.95) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      box-shadow: 0 0 20px rgba(0,212,255,0.15) !important;
      color: var(--bright) !important;
      padding: 0 !important;
    }
    .leaflet-popup-content { margin: 0 !important; padding: 12px 16px !important; font-family: 'Exo 2', sans-serif !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button { display: none !important; }
    .popup-num { font-family: 'Orbitron', sans-serif; font-size: 9px; color: var(--cyan); opacity: 0.7; letter-spacing: 2px; margin-bottom: 3px; }
    .popup-name { font-size: 13px; font-weight: 600; color: var(--bright); margin-bottom: 4px; white-space: nowrap; }
    .popup-loc  { font-size: 11px; color: var(--text); display: flex; align-items: center; gap: 6px; }

    .hover-tip.leaflet-tooltip {
      background: rgba(6,9,22,0.95) !important;
      border: 1px solid var(--border) !important;
      border-radius: 4px !important;
      box-shadow: 0 0 20px rgba(0,212,255,0.15) !important;
      padding: 12px 16px !important;
      color: var(--bright) !important;
      font-family: 'Exo 2', sans-serif !important;
    }
    .hover-tip.leaflet-tooltip::before { display: none !important; }

    /* ─── SEARCH RESULTS ─────────────────────────── */
    #search-results {
      position: fixed; top: 60px; right: 28px; z-index: 800;
      width: 230px; max-height: 300px; overflow-y: auto;
      background: var(--panel);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 4px 4px; display: none;
    }
    #search-results::-webkit-scrollbar { width: 3px; }
    #search-results::-webkit-scrollbar-thumb { background: var(--border); }
    .sr-item { padding: 9px 14px; cursor: pointer; border-bottom: 1px solid rgba(0,212,255,0.06); transition: background 0.1s; }
    .sr-item:hover { background: rgba(0,212,255,0.08); }
    .sr-num { font-size: 9px; color: var(--cyan); opacity: 0.6; font-family: 'Orbitron', sans-serif; }
    .sr-name { font-size: 12px; color: var(--bright); margin-top: 1px; }
    .sr-loc { font-size: 10px; color: var(--text); opacity: 0.65; margin-top: 1px; }

    /* ─── SPOTLIGHT POPUP ────────────────────────── */
    .sl-popup .leaflet-popup-content-wrapper {
      background: rgba(4, 6, 20, 0.97) !important;
      border: 1px solid var(--cyan) !important;
      border-radius: 6px !important;
      box-shadow: 0 0 0 1px rgba(0,212,255,0.08),
                  0 0 50px rgba(0,212,255,0.3),
                  0 8px 32px rgba(0,0,0,0.6) !important;
      padding: 0 !important; min-width: 240px;
    }
    .sl-popup .leaflet-popup-content { margin: 0 !important; padding: 0 !important; }
    .sl-popup .leaflet-popup-tip-container { display: none !important; }
    .sl-popup .leaflet-popup-close-button { display: none !important; }

    .sl-card {
      padding: 18px 20px 14px;
      position: relative; overflow: hidden;
    }
    .sl-card::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), transparent);
      opacity: 0.7;
    }
    .sl-card-num {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px; color: var(--cyan);
      letter-spacing: 3px; opacity: 0.9;
      margin-bottom: 7px;
      display: flex; align-items: center; gap: 8px;
      text-shadow: 0 0 10px var(--cyan);
    }
    .sl-live-dot {
      width: 6px; height: 6px;
      background: var(--cyan); border-radius: 50%;
      box-shadow: 0 0 6px var(--cyan);
      animation: livePulse 1.4s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes livePulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
    .sl-card-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 17px; font-weight: 700; color: var(--bright);
      line-height: 1.25; margin-bottom: 12px;
    }
    .sl-card-sep {
      height: 1px; margin-bottom: 10px;
      background: linear-gradient(90deg, rgba(0,212,255,0.4), transparent);
    }
    .sl-card-stats {
      display: flex; gap: 8px; margin-top: 10px;
    }
    .sl-stat {
      flex: 1;
      background: rgba(0,212,255,0.05);
      border: 1px solid rgba(0,212,255,0.15);
      border-radius: 3px;
      padding: 6px 8px;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sl-stat-lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 7px; letter-spacing: 2px;
      color: var(--cyan); opacity: 0.55;
      text-transform: uppercase; white-space: nowrap;
    }
    .sl-stat-val {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px; font-weight: 700;
      color: var(--bright);
      text-shadow: 0 0 8px rgba(0,212,255,0.3);
    }
    .sl-card-city {
      font-size: 12px; font-weight: 500; color: var(--text);
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 10px;
    }
    .sl-card-city .flag { font-size: 15px; }
    .sl-card-badge {
      display: inline-block;
      font-family: 'Orbitron', sans-serif;
      font-size: 8px; letter-spacing: 2px;
      color: var(--cyan); opacity: 0.55;
      border: 1px solid rgba(0,212,255,0.2);
      border-radius: 2px; padding: 2px 7px;
    }

    /* ─── SPOTLIGHT CONTROLS BAR ──────────────────── */
    #spotlight-bar {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(120px);
      z-index: 700;
      background: rgba(6, 9, 22, 0.97);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
      transition: transform 0.42s cubic-bezier(0.16, 1, 0.3, 1);
      backdrop-filter: blur(24px);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    #spotlight-bar::before {
      content: ''; position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan), var(--purple), transparent);
      opacity: 0.5; border-radius: 6px 6px 0 0;
    }
    #spotlight-bar.active { transform: translateX(-50%) translateY(0); }

    .sl-lbl {
      font-family: 'Orbitron', sans-serif;
      font-size: 8px; color: var(--cyan); opacity: 0.55;
      letter-spacing: 2.5px; white-space: nowrap;
    }
    .sl-btn {
      width: 30px; height: 30px;
      background: rgba(0,212,255,0.07);
      border: 1px solid var(--border); border-radius: 3px;
      color: var(--cyan); font-size: 13px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .sl-btn:hover { background: rgba(0,212,255,0.16); border-color: var(--cyan); }
    .sl-btn.main { width: 36px; height: 36px; font-size: 15px; }
    .sl-counter {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; color: var(--cyan); letter-spacing: 1px;
      white-space: nowrap; min-width: 52px; text-align: center;
    }
    .sl-prog-track {
      flex: 1; height: 2px; min-width: 80px;
      background: rgba(0,212,255,0.1); border-radius: 1px; overflow: hidden;
    }
    .sl-prog-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      box-shadow: 0 0 6px var(--cyan); border-radius: 1px;
    }
    .sl-close {
      width: 26px; height: 26px;
      background: rgba(255,45,120,0.07);
      border: 1px solid rgba(255,45,120,0.25); border-radius: 3px;
      color: var(--magenta); font-size: 11px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; user-select: none;
    }
    .sl-close:hover { background: rgba(255,45,120,0.18); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <header id="header">
    <div class="h-logo">
      <div class="h-badge">FTC</div>
      <div class="h-title">
        <h1>Premier Istanbul 2025</h1>

  <div id="scanlines"></div>
  <div class="corner tl"></div><div class="corner tr"></div>

  <div id="map"></div>
  <div id="search-results"></div>

  <!-- City filter panel -->
  <div id="city-panel">
    <div class="cp-header">

      <div class="cp-subtitle" id="cp-sub">— cities</div>

    </div>
    <div class="cp-list">

        <span class="cp-all-lbl">All Teams</span>

  </div>

  <!-- Team detail panel -->

  <!-- Spotlight control bar -->
  <div id="spotlight-bar">
    <span class="sl-lbl">SPOTLIGHT</span>
    <div class="sl-btn" id="sl-prev" onclick="slPrev()" title="Previous">&#8592;</div>
    <div class="sl-btn main" id="sl-playpause" onclick="slTogglePlay()" title="Play / Pause">&#9654;</div>

    <div class="sl-counter" id="sl-counter">1 / 77</div>
    <div class="sl-close" onclick="slClose()" title="Exit">&#10005;</div>

  <button class="float-btn" id="btn-spotlight" onclick="slStart()" title="Team spotlight">
    <svg width="11" height="11" viewBox="0 0 12 12" fill="none">

  </button>

    <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
      <rect x="1" y="3" width="14" height="1.5" rx="0.75" fill="#00d4ff"/>
      <rect x="1" y="7.25" width="10" height="1.5" rx="0.75" fill="#00d4ff"/>
      <rect x="1" y="11.5" width="12" height="1.5" rx="0.75" fill="#00d4ff"/>

  </button>
  <button class="float-btn" id="btn-reset" onclick="resetFilter()">↺ &nbsp;Show All</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script>
  // ── GEOCODING TABLES (city name → [lat, lng], used to place teams on the map) ─
  const CITY_COORDS = {
    // Canada
    'victoria': [48.428, -123.365], 'markham': [43.876, -79.268],
    // Cyprus

    'drama': [41.154, 24.141],      'vari': [37.828, 23.807],
    'vari ': [37.828, 23.807],
    // Moldova
    'ungheni': [47.211, 27.794],
    'chișinău': [47.009, 28.863], 'chisinau': [47.009, 28.863],
    'chisinau ': [47.009, 28.863],
    'măcărești': [47.003, 28.465], 'macaresti': [47.003, 28.465],
    // Malaysia
    'prai': [5.117, 100.405], 'georgetown': [5.414, 100.330],
    // India
    'chennai': [13.083, 80.271],    'mumbai': [19.078, 72.878],
    // Slovenia
    'ljubljana': [46.057, 14.506],
    // Nigeria
    'lekki phase 1': [6.447, 3.535], 'lekki': [6.447, 3.535],
    'abuja': [9.058, 7.490],
    // Morocco
    'mohammedia': [33.686, -7.383], 'goulmima': [31.690, -4.958],
    'casablanca': [33.573, -7.590],
    // UK
    'birmingham': [52.486, -1.890], 'cambridge': [52.205, 0.121],
    'guildford': [51.237, -0.569],  'lisburn': [54.515, -6.041],
    'london': [51.507, -0.128],
    // Poland
    'legionowo': [52.400, 20.933],
    'chełm': [51.134, 23.472],  'chelm': [51.134, 23.472],
    // UAE
    'dubai': [25.204, 55.282],      'al karama': [25.200, 55.275],
    // Qatar
    'doha': [25.285, 51.531],
    // Libya
    'sabha': [27.037, 14.429],      'sebha': [27.037, 14.429],
    // Kazakhstan
    'almaty': [43.222, 76.852],     'almaty ': [43.222, 76.852],
    'astana': [51.180, 71.446],     'shymkent': [42.300, 69.600],
    'shymkent ': [42.300, 69.600],  'kokshetau': [53.284, 69.392],
    // Taiwan
    'taipei': [25.033, 121.565],
    // Hungary
    'debrecen': [47.532, 21.627],
    // Spain
    'pamplona': [42.812, -1.645],
    // Vietnam
    'tuy hoa': [13.095, 109.293],
    // Australia
    'austral': [-33.925, 150.742],
  };

  const COUNTRY_FLAGS = {
    'Canada':'🇨🇦', 'Cyprus':'🇨🇾', 'Romania':'🇷🇴', 'Jamaica':'🇯🇲',
    'Indonesia':'🇮🇩', 'South Africa':'🇿🇦', 'Independent':'🌐',
    'China':'🇨🇳', 'Venezuela':'🇻🇪', 'Germany':'🇩🇪', 'USA':'🇺🇸',
    'Italy':'🇮🇹', 'Türkiye':'🇹🇷', 'Turkey':'🇹🇷', 'France':'🇫🇷',
    'Lithuania':'🇱🇹', 'Brazil':'🇧🇷', 'Greece':'🇬🇷', 'Moldova':'🇲🇩',
    'Malaysia':'🇲🇾', 'India':'🇮🇳', 'Slovenia':'🇸🇮', 'Nigeria':'🇳🇬',
    'Morocco':'🇲🇦', 'United Kingdom':'🇬🇧', 'Poland':'🇵🇱',
    'UAE':'🇦🇪', 'United Arab Emirates':'🇦🇪', 'Qatar':'🇶🇦',
    'Libya':'🇱🇾', 'Kazakhstan':'🇰🇿', 'Taiwan':'🇹🇼',
    'Chinese Taipei':'🇹🇼', 'Hungary':'🇭🇺', 'Spain':'🇪🇸', 'Vietnam':'🇻🇳',
    'Australia':'🇦🇺',
  };

  const COUNTRY_CENTROIDS = {
    'Canada':[56.130,-106.347], 'Cyprus':[35.126,33.430],
    'Romania':[45.943,24.967],  'Jamaica':[18.109,-77.298],
    'Indonesia':[-0.789,113.921], 'South Africa':[-30.560,22.938],
    'China':[35.861,104.195],   'Venezuela':[6.424,-66.590],
    'Germany':[51.165,10.451],  'USA':[38.895,-77.036],
    'Italy':[41.871,12.568],    'Türkiye':[38.964,35.243],
    'Turkey':[38.964,35.243],   'France':[46.603,1.888],
    'Lithuania':[55.169,23.881], 'Brazil':[-14.235,-51.926],
    'Greece':[39.074,21.824],   'Moldova':[47.412,28.370],
    'Malaysia':[4.211,101.976], 'India':[20.594,78.963],
    'Slovenia':[46.151,14.995], 'Nigeria':[9.082,8.676],
    'Morocco':[31.792,-7.090],  'United Kingdom':[55.378,-3.436],
    'Poland':[51.920,19.145],   'UAE':[23.424,53.848],
    'United Arab Emirates':[23.424,53.848], 'Qatar':[25.355,51.184],
    'Libya':[26.335,17.229],    'Kazakhstan':[48.019,66.924],
    'Taiwan':[23.698,120.961],  'Chinese Taipei':[23.698,120.961],
    'Hungary':[47.163,19.503],  'Spain':[40.463,-3.749],
    'Vietnam':[14.058,108.278],    'Australia':[-25.274,133.775],
  };

  // Ocean anchor points for teams with no registered location
  const OCEAN_POSITIONS = [
    { lat:  8.0, lng:-145.0 }, { lat:  2.0, lng: -28.0 },
    { lat:-18.0, lng:  72.0 }, { lat:-28.0, lng:-130.0 },
    { lat: 72.0, lng:  18.0 }, { lat:-40.0, lng: -90.0 },
    { lat: 15.0, lng: -55.0 }, { lat: 60.0, lng: -30.0 },
  ];

  // Spread multiple teams from the same city using golden-angle spiral
  const _jitterN = {};
  function jitteredCoords(key, base) {
    const n = (_jitterN[key] = (_jitterN[key] ?? 0));
    _jitterN[key]++;
    if (n === 0) return [base[0], base[1]];
    const angle = n * 2.39996; // golden angle rad
    const r = 0.09 + Math.floor(n / 6) * 0.07;
    return [base[0] + Math.sin(angle) * r, base[1] + Math.cos(angle) * r];
  }

  // ── LIVE DATA FROM FTC SCOUT ─────────────────────────────────────────────────
  let TEAMS = []; // populated async from FTC Scout on load
  let teamStatsCache = {};
  const GQL = 'https://api.ftcscout.org/graphql';

  async function fetchEventTeams() {
    const query = `{
      eventByCode(season: 2025, code: "FPEIST") {
        teams { team { number name location { city country } } }
      }
    }`;
    const res = await fetch(GQL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query }),
    });
    const { data } = await res.json();

    let oceanIdx = 0;
    return data.eventByCode.teams.map(({ team }) => {
      const { number, name, location } = team;
      const { city, country } = location;

      if (country === 'Independent' || !city.trim()) {
        const pos = OCEAN_POSITIONS[oceanIdx % OCEAN_POSITIONS.length];
        oceanIdx++;
        return { id: number, name, city: '—', country: 'Independent',
                 flag: '🌐', lat: pos.lat, lng: pos.lng, slZoom: 2 };
      }

      const cityKey = city.toLowerCase().trim();
      const base = CITY_COORDS[cityKey] ?? CITY_COORDS[city.trim()] ?? COUNTRY_CENTROIDS[country] ?? [0, 0];
      const [lat, lng] = jitteredCoords(cityKey, base);
      return {
        id: number, name,
        city: city.trim(), country,
        flag: COUNTRY_FLAGS[country] ?? '🏳️',
        lat, lng,
      };
    });
  }

  async function loadTeamStats(teams) {
    const ids = teams.map(t => t.id);
    const aliases = ids.map(n => `
      t${n}: teamByNumber(number: ${n}) {
        rookieYear
        quickStats(season: 2025) {
          tot { value rank }
          auto { value }
          dc { value }
          count
        }
      }
    `).join('');

    try {
      const res = await fetch(GQL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: `{ ${aliases} }` }),
      });
      const { data } = await res.json();

      for (const id of ids) {
        const d = data?.[`t${id}`];
        if (!d) continue;
        const qs = d.quickStats;
        teamStatsCache[id] = {
          rookieYear: d.rookieYear,
          npOpr:      qs?.tot?.value  != null ? Math.round(qs.tot.value)  : null,
          worldRank:  qs?.tot?.rank   != null ? qs.tot.rank               : null,
          worldTotal: qs?.count       != null ? qs.count                  : null,
          autoOpr:    qs?.auto?.value != null ? Math.round(qs.auto.value) : null,
          dcOpr:      qs?.dc?.value   != null ? Math.round(qs.dc.value)   : null,
        };
      }
    } catch (err) {
      console.warn('FTC Scout stats unavailable:', err);
    }
  }

  // ── MAP INIT ─────────────────────────────────────────────────────────────────
  const map = L.map('map', {
    center: [25, 15], zoom: 2,
    zoomControl: true, attributionControl: true, minZoom: 2,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 19,
  }).addTo(map);

  map.zoomControl.setPosition('bottomright');

  // ── MARKER FACTORY ───────────────────────────────────────────────────────────
  // state: '' | 'active' | 'spotlight'
  function makeIcon(state = '') {
    if (state === 'spotlight') {
      return L.divIcon({
        html: `<div class="spotlight-beacon">
          <div class="sb-ring"></div>
          <div class="sb-ring r2"></div>
          <div class="sb-ring r3"></div>
          <div class="sb-dot"></div>
        </div>`,
        className: '',
        iconSize: L.point(38, 38),
        iconAnchor: L.point(19, 19),
      });
    }
    return L.divIcon({
      html: `<div class="pin-wrap${state ? ' ' + state : ''}">
        <div class="pin-ring"></div><div class="pin-ring r2"></div>
        <div class="pin-dot"></div>
      </div>`,
      className: '', iconSize: L.point(22, 22), iconAnchor: L.point(11, 11),
    });
  }

  // Separate layer for the always-visible spotlight beacon (not in cluster group)
  const spotlightLayer = L.layerGroup().addTo(map);

  // ── BUILD MARKERS ────────────────────────────────────────────────────────────
  let activeTeamId = null;
  const markerMap = {};
  let clusterGroup = newClusterGroup();

  function newClusterGroup() {
    return L.markerClusterGroup({
      iconCreateFunction(cluster) {
        const n = cluster.getChildCount();
        const big = n >= 6;
        const s = big ? 44 : 36;
        return L.divIcon({
          html: `<div class="cluster-inner${big ? ' lg' : ''}">${n}</div>`,
          className: 'cluster-wrap',
          iconSize: L.point(s, s), iconAnchor: L.point(s/2, s/2),
        });
      },
      maxClusterRadius: 35,
      showCoverageOnHover: false,
      spiderfyOnMaxZoom: true,
      animate: true,
    });
  }

  function buildMarkers(teams) {
    map.removeLayer(clusterGroup);
    clusterGroup = newClusterGroup();

    teams.forEach(team => {
      const marker = L.marker([team.lat, team.lng], { icon: makeIcon(false), title: team.name });

      marker.on('click', e => {
        L.DomEvent.stopPropagation(e);
        if (activeTeamId !== null && markerMap[activeTeamId]) {
          markerMap[activeTeamId].setIcon(makeIcon());
        }
        marker.setIcon(makeIcon('active'));
        activeTeamId = team.id;
        openPanel(team);
      });

      const cityLine = team.city !== '—' ? team.city : 'Venue: Istanbul';
      marker.bindTooltip(`
        <div class="popup-num">TEAM #${team.id}</div>
        <div class="popup-name">${team.name}</div>
        <div class="popup-loc">${team.flag} ${cityLine}, ${team.country}</div>
      `, { className: 'hover-tip', direction: 'top', offset: [0, -8], sticky: false });

      clusterGroup.addLayer(marker);
      markerMap[team.id] = marker;
    });

    map.addLayer(clusterGroup);
  }

  // ── ASYNC APP INIT ───────────────────────────────────────────────────────────
  let activeCity = null;

  async function initApp() {
    try {
      TEAMS = await fetchEventTeams();
    } catch (err) {
      console.error('Failed to load teams from FTC Scout:', err);
      TEAMS = [];
    }

    buildMarkers(TEAMS);

    // Build city filter panel
    const cityMap = {};
    TEAMS.forEach(t => {
      const key = t.city !== '—' ? t.city : '(Independent)';
      if (!cityMap[key]) cityMap[key] = { count: 0, flag: t.flag, country: t.country, key };
      cityMap[key].count++;
    });
    const sortedCities = Object.values(cityMap).sort((a, b) => b.count - a.count);
    const realCityCount = Object.keys(cityMap).filter(k => k !== '(Independent)').length;

    document.getElementById('cp-sub').textContent = `${realCityCount} cities`;
    document.getElementById('stat-cities').textContent = 0;

    animCount(document.getElementById('stat-teams'), TEAMS.length);
    animCount(document.getElementById('stat-cities'), realCityCount);

    const cpItems = document.getElementById('cp-items');
    sortedCities.forEach(cityData => {
      const el = document.createElement('div');
      el.className = 'cp-item';
      el.dataset.city = cityData.key;
      el.dataset.search = cityData.key.toLowerCase() + ' ' + cityData.country.toLowerCase();
      el.innerHTML = `
        <div class="cp-left">
          <span class="cp-city">${cityData.key}</span>
          <span class="cp-country-lbl">${cityData.flag} ${cityData.country}</span>
        </div>
        <span class="cp-count">${cityData.count}</span>
      `;
      el.addEventListener('click', () => applyFilter(cityData.key));
      cpItems.appendChild(el);
    });

    // Kick off stats fetch in background — populates teamStatsCache before spotlight opens
    loadTeamStats(TEAMS);
  }

  initApp();

  // ── CLICK POPUP ──────────────────────────────────────────────────────────────
  let clickPopup = null;

  function openPanel(team) {
    const cityLine = team.city !== '—' ? `${team.city} · ${team.country}` : team.country;
    const s = teamStatsCache[team.id] || {};
    const fmt = v => v != null ? v : '—';
    const rankStr = s.worldRank != null ? `#${s.worldRank}` : '—';

    if (clickPopup) { map.closePopup(clickPopup); clickPopup = null; }

    clickPopup = L.popup({
      className: 'sl-popup',
      closeButton: false,
      autoPan: true,
      offset: [0, -10],
      maxWidth: 420,
    })
      .setLatLng([team.lat, team.lng])
      .setContent(`
        <div class="sl-card">
          <div class="sl-card-num">
            <span class="sl-live-dot"></span>TEAM #${team.id}
          </div>
          <div class="sl-card-name">${team.name}</div>
          <div class="sl-card-sep"></div>
          <div class="sl-card-city">
            <span class="flag">${team.flag}</span>${cityLine}
          </div>
          <div class="sl-card-sep"></div>
          <div class="sl-card-stats">
            <div class="sl-stat">
              <span class="sl-stat-lbl">World</span>
              <span class="sl-stat-val">${rankStr}</span>
            </div>
            <div class="sl-stat">
              <span class="sl-stat-lbl">NP&nbsp;OPR</span>
              <span class="sl-stat-val">${fmt(s.npOpr)}</span>
            </div>
            <div class="sl-stat">
              <span class="sl-stat-lbl">Auto</span>
              <span class="sl-stat-val">${fmt(s.autoOpr)}</span>
            </div>
            <div class="sl-stat">
              <span class="sl-stat-lbl">Teleop</span>
              <span class="sl-stat-val">${fmt(s.dcOpr)}</span>
            </div>
          </div>
        </div>
      `)
      .openOn(map);

    clickPopup.on('remove', () => {
      if (activeTeamId !== null && markerMap[activeTeamId]) {
        markerMap[activeTeamId].setIcon(makeIcon());
        activeTeamId = null;
      }
      clickPopup = null;
    });
  }

  function closePanel() {
    if (clickPopup) { map.closePopup(clickPopup); clickPopup = null; }
    if (activeTeamId !== null && markerMap[activeTeamId]) {
      markerMap[activeTeamId].setIcon(makeIcon());
      activeTeamId = null;
    }
  }

  // ── CITY FILTER ───────────────────────────────────────────────────────────────
  function animCount(el, target, duration = 800) {
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      el.textContent = Math.round(p * target);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  document.getElementById('cp-all-btn').addEventListener('click', resetFilter);

  function applyFilter(city) {
    activeCity = city;
    document.querySelectorAll('.cp-item').forEach(el => el.classList.toggle('active', el.dataset.city === city));
    document.getElementById('btn-reset').classList.add('show');

    const filtered = TEAMS.filter(t => (t.city !== '—' ? t.city : '(Independent)') === city);
    buildMarkers(filtered);

    if (filtered.length === 1) {
      map.setView([filtered[0].lat, filtered[0].lng], 10, { animate: true });
    } else {
      const bounds = L.latLngBounds(filtered.map(t => [t.lat, t.lng]));
      map.fitBounds(bounds, { padding: [80, 80], animate: true, maxZoom: 12 });
    }
    closePanel();
  }

  function resetFilter() {
    activeCity = null;
    document.querySelectorAll('.cp-item').forEach(el => el.classList.remove('active'));
    document.getElementById('btn-reset').classList.remove('show');
    buildMarkers(TEAMS);
    closePanel();
  }

  // ── CITY PANEL SEARCH ─────────────────────────────────────────────────────────
  document.getElementById('city-search').addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    document.querySelectorAll('.cp-item').forEach(el => {
      el.classList.toggle('hidden', q.length > 0 && !el.dataset.search.includes(q));
    });
  });

  // ── CITY PANEL TOGGLE ─────────────────────────────────────────────────────────
  let cityPanelOpen = false;
  function toggleCityPanel() {
    cityPanelOpen = !cityPanelOpen;
    document.getElementById('city-panel').classList.toggle('open', cityPanelOpen);
    const offset = cityPanelOpen ? 264 : 24;
    document.getElementById('btn-cities').style.left = offset + 'px';
    document.getElementById('btn-reset').style.left  = (offset + 126) + 'px';
  }

  // ── GLOBAL SEARCH ─────────────────────────────────────────────────────────────
  const searchInput   = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim().toLowerCase();
    if (!q) { searchResults.style.display = 'none'; return; }
    const hits = TEAMS.filter(t =>
      t.name.toLowerCase().includes(q) ||
      t.city.toLowerCase().includes(q) ||
      t.country.toLowerCase().includes(q) ||
      String(t.id).includes(q)
    ).slice(0, 9);

    if (!hits.length) { searchResults.style.display = 'none'; return; }

    searchResults.innerHTML = hits.map(t => `
      <div class="sr-item" data-id="${t.id}">
        <div class="sr-num">TEAM #${t.id}</div>
        <div class="sr-name">${t.name}</div>
        <div class="sr-loc">${t.flag} ${t.city !== '—' ? t.city + ', ' : ''}${t.country}</div>
      </div>
    `).join('');

    searchResults.querySelectorAll('.sr-item').forEach(el => {
      el.addEventListener('click', () => {
        const team = TEAMS.find(t => t.id === Number(el.dataset.id));
        if (!team) return;
        searchInput.value = '';
        searchResults.style.display = 'none';
        map.setView([team.lat, team.lng], 10, { animate: true });
        openPanel(team);
      });
    });
    searchResults.style.display = 'block';
  });

  document.addEventListener('click', e => {
    if (!searchInput.contains(e.target) && !searchResults.contains(e.target))
      searchResults.style.display = 'none';
  });

  // ── SPOTLIGHT ─────────────────────────────────────────────────────────────────
  const SL_ZOOM     = 5;    // "country level" zoom
  const SL_TOTAL    = 5000; // ms per team (fly + view time)
  const SL_FLY_SEC  = 1.4;  // flyTo duration in seconds

  let slActive     = false;
  let slIndex      = 0;
  let slTimer      = null;
  let slPopup      = null;
  let slGeneration = 0;
  let SPOTLIGHT_ORDER = []; // teams sorted for maximum cross-globe panning

  // Greedy "farthest-next" sort so every transition pans across large distances.
  // Geographic distance is approximated on a flat (lng, lat) grid which is fine
  // for maximising visual jump — we don't need great-circle accuracy here.
  function buildSpotlightOrder(teams) {
    if (teams.length <= 1) return [...teams];
    const pool = [...teams];
    // Start from an Americas team for a dramatic opening pan toward Europe/Asia
    const startIdx = pool.findIndex(t => t.lng < -60) >= 0
      ? pool.findIndex(t => t.lng < -60) : 0;
    const sorted = pool.splice(startIdx, 1);

    while (pool.length > 0) {
      const last = sorted[sorted.length - 1];
      let best = 0, bestDist = -1;
      for (let i = 0; i < pool.length; i++) {
        // Wrap longitude distance so e.g. -160 ↔ 160 is treated as close
        let dlng = Math.abs(pool[i].lng - last.lng);
        if (dlng > 180) dlng = 360 - dlng;
        const dlat = pool[i].lat - last.lat;
        const dist = dlng * dlng + dlat * dlat;
        if (dist > bestDist) { bestDist = dist; best = i; }
      }
      sorted.push(pool.splice(best, 1)[0]);
    }
    return sorted;
  }

  function slShow(index) {
    const gen = ++slGeneration;
    const team = SPOTLIGHT_ORDER[index];

    // Close previous popup
    if (slPopup) { map.closePopup(slPopup); slPopup = null; }

    // Replace spotlight beacon on its own layer (never clustered)
    // Independent teams have no fixed location so no beacon
    spotlightLayer.clearLayers();
    if (team.city !== '—') {
      const spotMarker = L.marker([team.lat, team.lng], {
        icon: makeIcon('spotlight'),
        zIndexOffset: 2000,
        interactive: false,
      });
      spotlightLayer.addLayer(spotMarker);
    }

    // Dim every regular cluster-group pin
    document.getElementById('map').classList.add('spotlight-mode');

    // Fly to team — use world zoom for independent teams, country zoom for others
    const zoom = team.slZoom ?? SL_ZOOM;
    map.flyTo([team.lat, team.lng], zoom, {
      duration: SL_FLY_SEC,
      easeLinearity: 0.35,
    });

    // Show popup once the map settles
    map.once('moveend', () => {
      if (gen !== slGeneration) return; // stale — a newer slide took over
      const cityLine = team.city !== '—'
        ? `${team.city} · ${team.country}`
        : team.country;
      const stats = teamStatsCache[team.id] || {};
      const fmt = v => v != null ? v : '—';
      const rankStr = stats.worldRank != null ? `#${stats.worldRank}` : '—';
      const statsHtml = `
        <div class="sl-card-sep"></div>
        <div class="sl-card-stats">
          <div class="sl-stat">
            <span class="sl-stat-lbl">World</span>
            <span class="sl-stat-val">${rankStr}</span>
          </div>
          <div class="sl-stat">
            <span class="sl-stat-lbl">NP&nbsp;OPR</span>
            <span class="sl-stat-val">${fmt(stats.npOpr)}</span>
          </div>
          <div class="sl-stat">
            <span class="sl-stat-lbl">Auto</span>
            <span class="sl-stat-val">${fmt(stats.autoOpr)}</span>
          </div>
          <div class="sl-stat">
            <span class="sl-stat-lbl">Teleop</span>
            <span class="sl-stat-val">${fmt(stats.dcOpr)}</span>
          </div>
        </div>`;
      slPopup = L.popup({
        className: 'sl-popup',
        closeButton: false,
        autoPan: false,
        offset: [0, -6],
        maxWidth: 420,
      })
        .setLatLng([team.lat, team.lng])
        .setContent(`
          <div class="sl-card">
            <div class="sl-card-num">
              <span class="sl-live-dot"></span>TEAM #${team.id}
            </div>
            <div class="sl-card-name">${team.name}</div>
            <div class="sl-card-sep"></div>
            <div class="sl-card-city">
              <span class="flag">${team.flag}</span>${cityLine}
            </div>
            ${statsHtml}
          </div>
        `)
        .openOn(map);
    });

    // Update counter + progress bar
    document.getElementById('sl-counter').textContent = `${index + 1} / ${SPOTLIGHT_ORDER.length}`;
    const fill = document.getElementById('sl-progress');
    fill.style.transition = 'none';
    fill.style.width = '0%';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fill.style.transition = `width ${SL_TOTAL}ms linear`;
      fill.style.width = '100%';
    }));
  }

  function slAdvance() {
    slIndex = (slIndex + 1) % SPOTLIGHT_ORDER.length;
    slShow(slIndex);
  }

  function slNext() {
    clearInterval(slTimer);
    slIndex = (slIndex + 1) % SPOTLIGHT_ORDER.length;
    slShow(slIndex);
    if (slActive) slTimer = setInterval(slAdvance, SL_TOTAL);
  }

  function slPrev() {
    clearInterval(slTimer);
    slIndex = (slIndex - 1 + SPOTLIGHT_ORDER.length) % SPOTLIGHT_ORDER.length;
    slShow(slIndex);
    if (slActive) slTimer = setInterval(slAdvance, SL_TOTAL);
  }

  function slStart() {
    if (slActive) return;
    SPOTLIGHT_ORDER = buildSpotlightOrder(TEAMS);
    slActive = true;
    closePanel();
    document.getElementById('spotlight-bar').classList.add('active');
    document.getElementById('btn-spotlight').style.display = 'none';
    document.getElementById('sl-playpause').innerHTML = '&#9646;&#9646;';
    slShow(slIndex);
    slTimer = setInterval(slAdvance, SL_TOTAL);
  }

  function slPause() {
    slActive = false;
    clearInterval(slTimer); slTimer = null;
    document.getElementById('sl-playpause').innerHTML = '&#9654;';
    // Freeze progress bar in place
    const fill = document.getElementById('sl-progress');
    fill.style.transition = 'none';
    fill.style.width = getComputedStyle(fill).width;
  }

  function slResume() {
    slActive = true;
    document.getElementById('sl-playpause').innerHTML = '&#9646;&#9646;';
    slShow(slIndex);
    slTimer = setInterval(slAdvance, SL_TOTAL);
  }

  function slTogglePlay() {
    if (slActive) slPause(); else slResume();
  }

  function slClose() {
    slActive = false;
    clearInterval(slTimer); slTimer = null;
    if (slPopup) { map.closePopup(slPopup); slPopup = null; }
    spotlightLayer.clearLayers();
    document.getElementById('map').classList.remove('spotlight-mode');
    activeTeamId = null;
    document.getElementById('spotlight-bar').classList.remove('active');
    document.getElementById('btn-spotlight').style.display = '';
    document.getElementById('sl-playpause').innerHTML = '&#9654;';
    slIndex = 0;
  }

  // Clicking the map during spotlight doesn't close the popup
  map.on('click', () => {
    if (!slActive) closePanel();
  });
  </script>
</body>
</html>
